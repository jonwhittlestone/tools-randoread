<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>randoread</title>
  <!-- Traefik strips the /randoread path prefix before proxying here, but the
       browser's URL bar (and therefore relative-URL resolution) still has it.
       <base> makes every relative link/fetch resolve under /randoread/
       regardless of whether the visited URL had a trailing slash. -->
  <base href="/randoread/" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23ff3cd5'/%3E%3Ctext x='50' y='74' font-size='62' font-family='Arial, Helvetica, sans-serif' font-weight='bold' text-anchor='middle' fill='white'%3ER%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <section id="login-screen" class="hidden">
    <h1>randoread</h1>
    <p>Use your login link to access randoread. Visit
      <code>/randoread/?token=&lt;token&gt;</code> to log in — the token is
      then remembered on this device for 90 days.</p>
  </section>

  <section id="app" class="hidden">
    <header class="app-header">
      <div class="toolbar">
        <button id="daily-button" class="pill-button">Daily 📅</button>
        <button id="rando-button" class="pill-button">Rando ♻</button>
        <button id="clipped-button" class="pill-button">Clipped ✂️</button>
        <div class="spacer"></div>
        <button id="menu-button" class="icon-button" aria-label="Menu">☰</button>
      </div>

      <div id="menu-panel" class="menu-panel hidden">
        <div id="dropbox-status">Dropbox: checking…</div>
        <button id="dropbox-connect-btn" class="hidden">Connect Dropbox</button>
        <button id="dropbox-disconnect-btn" class="hidden">Disconnect Dropbox</button>
        <button id="email-button">Email this note</button>
        <div id="email-status"></div>
      </div>

      <div id="note-title"></div>
    </header>

    <div id="note-scroll">
      <div id="note-content"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
